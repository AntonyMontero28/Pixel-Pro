<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Realiza tu Pedido - PixelPro</title>
    <link rel="stylesheet" href="css/pe.css">
</head>
<body>
    <h2>Realiza tu Pedido</h2>
    <form method="POST" action="php/guardar.php">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Correo:</label><br>
        <input type="email" name="correo" required><br><br>

        <label>Teléfono:</label><br>
        <input type="tel" name="telefono" required><br><br>

        <label>Tipo de Impresión:</label><br>
        <select name="servicio" required>
            <option value="">Selecciona</option>
            <option>Fotográfica</option>
            <option>Blanco y negro</option>
            <option>Color</option>
            <option>Máximo color</option>
        </select><br><br>

        <label>Detalles del Pedido:</label><br>
        <textarea name="mensaje" required></textarea><br><br>

        <input type="submit" value="Enviar Pedido">
    </form>
</body>
</html>
