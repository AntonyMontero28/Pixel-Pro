<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PixelPro Pedido</title>
<link rel="stylesheet" href="css/pe.css">
</head>

<body>

<div class="shape cyan"></div>
<div class="shape magenta"></div>
<div class="shape yellow"></div>

<section class="pedido-container">

<h1>Realiza tu Pedido</h1>

<form method="POST" action="php/guardar.php" enctype="multipart/form-data">

<input type="text" name="nombre" placeholder="Nombre" required>
<input type="email" name="correo" placeholder="Correo" required>
<input type="tel" name="telefono" placeholder="Teléfono" required>

<select name="servicio" required>
<option value="">Tipo de impresión</option>
<option>Color</option>
<option>Blanco y negro</option>
</select>

<textarea name="mensaje" placeholder="Detalles"></textarea>

<input type="file" name="archivo" required>

<button>Enviar Pedido</button>

</form>

</section>

</body>
</html>
