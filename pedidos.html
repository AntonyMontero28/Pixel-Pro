<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pro - Pedidos</title>
    <link rel="stylesheet" href="css/Pedidos.css">
</head>
<body>
    <form>
        <h2>Pedidos</h2>
        <div class="input-group">

            <label for="name">Nombre</label>
            <input type="text" name="name" id="name" placeholder="Nombre">
            <label>Tipo de impresión:</label>
        <div class="radio-group">
            <input type="radio" name="tipo" value="foto" required> Foto
            <input type="radio" name="tipo" value="documento"> Documento
        </div>
             <label>Cantidad:</label>
             <input type="number" name="cantidad" min="1" required>
            <label>Subir archivo (opcional):</label>
          <input type="file" name="archivo">
            <label>Producto escolar (si compra):</label>
           <input type="text" name="producto">
        <input class="btn" type="submit" value="Enviar">


    </form>
</body>
</html>
