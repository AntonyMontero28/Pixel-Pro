<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PixelPro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <h2 class="logo">PixelPro</h2>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Productos</a>
        <a href="#">Nosotros</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>IMPRESIONES<br><span>DIGITALES PRO</span></h1>
        <p>Calidad profesional en cada impresión. ¡Ordena ahora!</p>
    </div>
    <div class="hero-img">
        <!-- IMAGEN AQUÍ -->
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">
    <div class="products-header">
        <h2>PRODUCTOS</h2>
        <div class="search-cart">
            <input type="text" placeholder="Buscar...">
            <button>🔍</button>
            <span class="cart">🛒</span>
        </div>
    </div>

    <div class="grid">

        <!-- CARD -->
        <div class="card">
            <div class="img"></div>
            <p class="price">RD$300</p>
            <h3>Tarjetas de Presentación</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

        <div class="card">
            <div class="img"></div>
            <p class="price">RD$500</p>
            <h3>Flyers</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

        <div class="card">
            <div class="img"></div>
            <p class="price">RD$800</p>
            <h3>Banners</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

        <div class="card">
            <div class="img"></div>
            <p class="price">RD$250</p>
            <h3>Stickers</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

        <div class="card">
            <div class="img"></div>
            <p class="price">RD$600</p>
            <h3>Posters</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

        <div class="card">
            <div class="img"></div>
            <p class="price">RD$1200</p>
            <h3>Catálogos</h3>
            <div class="buttons">
                <button>Comprar</button>
                <button>Agregar</button>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div>PixelPro</div>
    <div>Contacto: 809-000-0000</div>
    <div>Redes: 🌐 📸 🐦</div>
</footer>

</body>
</html>
